server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  docker:
    compose:
      enabled: false
  application:
    name: novel-app

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:3306/novel_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&sessionVariables=character_set_client=utf8mb4,character_set_connection=utf8mb4,character_set_results=utf8mb4
    username: root
    password: 123456
    hikari:
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  servlet:
    multipart:
      enabled: true
      max-file-size: 2MB
      max-request-size: 2MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.novel.entity

# JWT配置
jwt:
  secret: novel-admin-jwt-secret-key-2026-04-20 # 密钥，生产环境需使用更安全的密钥
  expiration: 86400000 # token过期时间（毫秒），24小时
  header: Authorization # 请求头名称

# 文件上传配置
app:
  upload:
    avatar-path: uploads/avatars/      # 头像上传路径
    avatar-url: /uploads/avatars/      # 头像访问URL前缀
    cover-path: uploads/covers/        # 封面上传路径
    cover-url: /uploads/covers/        # 封面访问URL前缀

logging:
  level:
    com.example.novel: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/novel-app.log